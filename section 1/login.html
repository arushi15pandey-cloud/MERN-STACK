<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    
    <link href="https://fonts.googleapis.com/css?family=DynaPuff:regular,500,600,700" rel="stylesheet" />

    <style>

        .card{
            border: 1px solid red;
            width: 20%;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 3px 3px 10px 0px rgb(39, 38, 38);
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="card">
       <h3 class="form-title">Login form</h3>
       <form action="">
        <label for="">Email Address</label>
        <input type="email" class="text-input">
        
        <label for="">Password</label>
        <input type="password" class="text-input">

        <button class="btn-submit">Submit</button>
       </form>
       </div> 
</body>
</html>
